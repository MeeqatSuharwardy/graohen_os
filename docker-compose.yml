services:
  flashdash:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://freedomos.vulcantech.co
    container_name: flashdash
    ports:
      - "81:80" # HTTP port (using 81 to avoid conflict with system nginx on port 80)
      - "444:443" # HTTPS port (using 444 to avoid conflict with system nginx on port 443)
      - "8000:8000"
    volumes:
      - ./bundles:/app/bundles
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      # Uncomment when using Let's Encrypt certificates:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - PY_HOST=0.0.0.0
      - PY_PORT=8000
      - BUNDLES_DIR=/app/bundles
      - GRAPHENE_BUNDLES_ROOT=/app/bundles
      - APK_STORAGE_DIR=/app/apks
      - DEBUG=false
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - FRONTEND_DOMAIN=freedomos.vulcantech.co
      - BACKEND_DOMAIN=freedomos.vulcantech.co
      - EMAIL_DOMAIN=vulcantech.tech
      - DRIVE_DOMAIN=freedomos.vulcantech.co
      - API_BASE_URL=https://freedomos.vulcantech.co
      - EXTERNAL_HTTPS_BASE_URL=https://vulcantech.tech
      - VITE_API_BASE_URL=https://freedomos.vulcantech.co
      - CORS_ORIGINS=*
      - ALLOWED_HOSTS=freedomos.vulcantech.co,vulcantech.tech
    restart: unless-stopped
    devices:
      - /dev/bus/usb:/dev/bus/usb # For USB device access (Linux only)
    privileged: true # Required for USB device access
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
