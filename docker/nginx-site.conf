    # Downloads
    location /downloads {
        alias /app/downloads;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Main web app (catch-all)
    location / {
        root /app/frontend/web;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}
