# Drive service server block (redirects to backend.vulcantech.tech)
server {
    listen 80;
    server_name drive.vulcantech.tech;

    # CORS headers
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Handle preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Increase upload size for drive files
    client_max_body_size 500M;

    # Drive API routes - proxy to Python backend
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeouts for file uploads
        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
    }
}

# Default server block (fallback for localhost or other domains)
server {
    listen 80 default_server;
    server_name _;

    # Static assets
    location /assets/ {
        root /app/frontend/web;
        expires 1y;
        add_header Cache-Control "public, immutable";
