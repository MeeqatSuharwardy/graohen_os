# Frontend server block - freedomos.vulcantech.co
server {
    listen 80;
    server_name freedomos.vulcantech.co;

    # Static assets (must come before other locations)
    location /assets/ {
        root /app/frontend/web;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Web flasher app (must come before root location)
    location /flash/ {
        alias /app/frontend/web-flasher/;
        try_files $uri $uri/ /flash/index.html;
        index index.html;
    }
    
    location /flash {
        return 301 /flash/;
    }

    # Downloads - serve desktop app installers
    location /downloads {
        alias /app/downloads;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Access-Control-Allow-Origin *;
    }

    # Main web app (catch-all, must be last)
    location / {
        root /app/frontend/web;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}

# Backend API server block - HTTPS (if SSL certificates are available)
server {
    listen 443 ssl http2;
    server_name freedomos.vulcantech.co;

    # SSL certificates (if using Let's Encrypt - uncomment when certificates are available)
    # ssl_certificate /etc/letsencrypt/live/freedomos.vulcantech.co/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/freedomos.vulcantech.co/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # CORS headers for API
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Handle preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # API routes - proxy to Python backend
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeouts for long-running operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

