<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download FlashDash for Windows</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 {
      color: #667eea;
      margin-bottom: 20px;
      font-size: 2em;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 1.1em;
    }

    .download-section {
      margin: 40px 0;
    }

    .download-btn {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 16px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1.2em;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .download-btn:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .warning-box {
      background: #fff3cd;
      border: 2px solid #ffc107;
      border-radius: 8px;
      padding: 20px;
      margin-top: 30px;
      text-align: left;
    }

    .warning-box h3 {
      color: #856404;
      margin-bottom: 10px;
    }

    .warning-box p {
      color: #856404;
      line-height: 1.6;
    }

    .os-message {
      background: #f8d7da;
      border: 2px solid #dc3545;
      border-radius: 8px;
      padding: 20px;
      color: #721c24;
    }

    .os-message h2 {
      color: #721c24;
      margin-bottom: 10px;
    }

    .icon {
      font-size: 4em;
      margin-bottom: 20px;
    }

    .info {
      margin-top: 30px;
      color: #666;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .info a {
      color: #667eea;
      text-decoration: none;
    }

    .info a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚡</div>
    <h1>FlashDash Client</h1>
    <p class="subtitle">Trusted desktop client for Android OS flashing</p>

    <div id="content">
      <!-- Content will be dynamically shown based on OS -->
    </div>
  </div>

  <script>
    /**
     * Detect operating system and show appropriate content
     */
    function detectOS() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;
      const contentDiv = document.getElementById('content');
      
      // Check for Windows
      if (/windows|win32|win64/i.test(userAgent)) {
        contentDiv.innerHTML = `
          <div class="download-section">
            <h2>Download FlashDash for Windows</h2>
            <a href="FlashDash-Setup.exe" class="download-btn" download>
              📥 Download FlashDash-Setup.exe
            </a>
          </div>

          <div class="warning-box">
            <h3>⚠️ System Requirements</h3>
            <p>
              <strong>Before installing FlashDash:</strong><br>
              • Ensure you have <strong>adb</strong> and <strong>fastboot</strong> installed and in your PATH<br>
              • Enable USB debugging on your Android device<br>
              • Connect your Pixel device via USB<br>
              • Windows Defender or antivirus may flag the installer - this is normal for Electron apps
            </p>
          </div>

          <div class="info">
            <p>
              FlashDash is a trusted Electron desktop application that provides a secure frontend
              for flashing Android OS images to Pixel devices. All flashing operations are performed
              securely by the backend server - FlashDash only detects devices and displays progress.
            </p>
            <p style="margin-top: 15px;">
              <strong>Backend:</strong> <a href="https://freedomos.vulcantech.co" target="_blank">freedomos.vulcantech.co</a>
            </p>
          </div>
        `;
      } else {
        // Non-Windows users
        contentDiv.innerHTML = `
          <div class="os-message">
            <h2>Windows Only</h2>
            <p>
              This download page is for Windows users only. FlashDash Client is currently
              available for Windows, macOS, and Linux. Please visit the main download page
              for your operating system.
            </p>
          </div>

          <div class="info" style="margin-top: 30px;">
            <p>
              <strong>Detected OS:</strong> ${navigator.platform}<br>
              <strong>User Agent:</strong> ${userAgent.substring(0, 100)}...
            </p>
            <p style="margin-top: 15px;">
              For macOS or Linux builds, please contact the development team or check
              the main project repository.
            </p>
            <p style="margin-top: 15px;">
              <strong>Backend:</strong> <a href="https://freedomos.vulcantech.co" target="_blank">freedomos.vulcantech.co</a>
            </p>
          </div>
        `;
      }
    }

    // Run OS detection on page load
    detectOS();
  </script>
</body>
</html>
